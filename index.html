<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Meme mèo 😺</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #111, #000);
      overflow: hidden;
      font-family: Arial;
    }

    h1 {
      color: white;
      margin-bottom: 20px;
      animation: fadeIn 2s ease-in-out;
    }

    /* Ảnh mèo */
    .meme {
      width: 320px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(255,255,255,0.2);
      animation: float 3s ease-in-out infinite;
      transition: transform 0.3s;
    }

    .meme:hover {
      transform: scale(1.1) rotate(-2deg);
    }

    /* Hiệu ứng bay lên xuống */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    /* chữ xuất hiện */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* icon mèo bay */
    .cat {
      position: absolute;
      font-size: 30px;
      animation: fly 8s linear infinite;
      opacity: 0.6;
    }

    @keyframes fly {
      0% { transform: translateY(100vh) translateX(0); }
      100% { transform: translateY(-10vh) translateX(100px); }
    }
  </style>
</head>

<body>

  <h1>Meme mèo siêu cấp 😺</h1>

  <!-- Ảnh của bạn -->
  <img class="meme" src="anhmeomeme.png" alt="meme mèo">

  <!-- icon mèo bay -->
  <div class="cat" style="left:10%">😺</div>
  <div class="cat" style="left:30%; animation-delay:2s">🐱</div>
  <div class="cat" style="left:60%; animation-delay:4s">😹</div>
  <div class="cat" style="left:80%; animation-delay:1s">😻</div>

</body>
</html>
