<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Meme mèo 😺</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #111, #000);
      overflow: hidden;
      font-family: Arial;
    }

    h1 {
      color: white;
      margin-bottom: 20px;
      animation: fade 1.5s ease-in-out;
    }

    img {
      width: 340px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(255,255,255,0.25);
      animation: float 3s ease-in-out infinite;
      transition: 0.3s;
    }

    img:hover {
      transform: scale(1.1);
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
      100% { transform: translateY(0); }
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .emoji {
      position: absolute;
      font-size: 28px;
      animation: fly 7s linear infinite;
      opacity: 0.6;
    }

    @keyframes fly {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-10vh); }
    }
  </style>
</head>

<body>

  <h1>Meme mèo của Jun 😺</h1>

  <!-- Ảnh của bạn (QUAN TRỌNG) -->
  <img src="anhmeomeme.png" alt="meme mèo">

  <!-- emoji bay -->
  <div class="emoji" style="left:10%">😺</div>
  <div class="emoji" style="left:30%; animation-delay:2s">🐱</div>
  <div class="emoji" style="left:55%; animation-delay:1s">😹</div>
  <div class="emoji" style="left:80%; animation-delay:3s">😻</div>

</body>
</html>
