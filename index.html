<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gửi em 😼</title>
    <style>
        body {
            background: #111;
            color: white;
            text-align: center;
            font-family: Arial;
            padding-top: 50px;
        }

        h1 {
            color: pink;
        }

        .box {
            margin-top: 30px;
        }

        img {
            width: 250px;
            border-radius: 20px;
            box-shadow: 0 0 20px pink;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: pink;
            color: black;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
        }

        .btn:hover {
            background: hotpink;
        }
    </style>
</head>

<body>

    <h1>Em đang làm gì đó 😼</h1>
    <p>Nhìn con mèo này giống em không =)))</p>

    <div class="box">
        <img src="https://i.imgur.com/JWbZg8P.jpeg" alt="mèo meme">
    </div>

    <button class="btn" onclick="alert('Anh biết là em đang cười rồi 😏')">
        Bấm vào đây
    </button>

</body>
</html>
