<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Meme mèo 😼</title>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
    padding-top:50px;
    overflow:hidden;
}

/* CHỮ CHẠY */
.marquee {
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    box-sizing: border-box;
}

.marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: move 8s linear infinite;
    font-size: 20px;
    color: pink;
    font-weight: bold;
}

@keyframes move {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

/* ẢNH MÈO */
img {
    width: 280px;
    border-radius: 20px;
    margin-top: 30px;
    box-shadow: 0 0 25px pink;
    animation: float 2s ease-in-out infinite;
}

/* MÈO NHÚN NHÚN */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

/* NÚT */
button {
    margin-top: 25px;
    padding: 10px 20px;
    border: none;
    background: pink;
    color: black;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: hotpink;
}
</style>

</head>

<body>

<!-- CHỮ MEME CHẠY -->
<div class="marquee">
    <span>🐱 Meme mèo đang hoạt động... nhìn em giống con mèo này không 😼 💖 💖 💖</span>
</div>

<!-- ẢNH MÈO -->
<img src="https://i.imgur.com/JWbZg8P.jpeg" alt="mèo meme">

<br>

<button onclick="alert('Em bị trap bởi meme mèo rồi 😏')">
    Bấm vào đây
</button>

</body>
</html>
